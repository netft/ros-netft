name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  native-ros:
    name: ROS ${{ matrix.distro }} (${{ matrix.policy }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: noetic
            image: ros:noetic-ros-base
            ros_version: 1
            policy: legacy-eol-source-only
          - distro: humble
            image: ros:humble-ros-base
            ros_version: 2
            policy: compatibility
          - distro: jazzy
            image: ros:jazzy-ros-base
            ros_version: 2
            policy: primary
          - distro: kilted
            image: ros:kilted-ros-base
            ros_version: 2
            policy: active-short-lived
          - distro: lyrical
            image: ros:lyrical-ros-base
            ros_version: 2
            policy: primary
          - distro: rolling
            image: ros:rolling-ros-base
            ros_version: 2
            policy: development
    container:
      image: ${{ matrix.image }}
    env:
      DEBIAN_FRONTEND: noninteractive
      ROS_DISTRO: ${{ matrix.distro }}
      ROS_VERSION: ${{ matrix.ros_version }}
    steps:
      - name: Install checkout dependency
        run: apt-get update && apt-get install -y git
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install source dependencies
        shell: bash
        run: |
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          if [[ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]]; then
            rosdep init
          fi
          rosdep update --rosdistro "${ROS_DISTRO}" --include-eol-distros
          rosdep install --from-paths . --ignore-src -r -y \
            --rosdistro "${ROS_DISTRO}"
          apt-get install -y python3-pytest procps util-linux
          if [[ "${ROS_VERSION}" == "2" ]]; then
            apt-get install -y python3-colcon-common-extensions
          fi
      - name: Run ROS-neutral C++ tests
        shell: bash
        run: |
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          cmake -S . -B build/core-only -DNETFT_CORE_ONLY=ON
          cmake --build build/core-only
          registered_tests="$(ctest --test-dir build/core-only -N | sed -n 's/^Total Tests: //p')"
          test -n "${registered_tests}"
          test "${registered_tests}" -gt 0
          ctest --test-dir build/core-only --output-on-failure
      - name: Run pure and package tests
        shell: bash
        run: |
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          python3 -m pytest
          bash test/integration/build_package.sh
      - name: Run loopback graph smoke
        shell: bash
        run: |
          source "/opt/ros/${ROS_DISTRO}/setup.bash"
          if [[ "${ROS_VERSION}" == "1" ]]; then
            bash test/integration/ros1_smoke.sh
          else
            bash test/integration/ros2_smoke.sh
            if [[ "${ROS_DISTRO}" == "jazzy" ]]; then
              bash test/integration/ros2_control_isolation_test.sh
            else
              bash test/integration/ros2_control_smoke.sh
            fi
          fi

  ci-success:
    name: CI success
    if: always()
    needs: native-ros
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify required jobs
        env:
          NATIVE_ROS_RESULT: ${{ needs.native-ros.result }}
        run: test "${NATIVE_ROS_RESULT}" = "success"

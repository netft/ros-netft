name: Release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Verify version consistency
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import tomllib
          import xml.etree.ElementTree as ET

          expected = os.environ["RELEASE_VERSION"]
          package_version = ET.parse("package.xml").getroot().findtext("version")
          with open("pixi.toml", "rb") as manifest:
              pixi_version = tomllib.load(manifest)["workspace"]["version"]

          versions = {
              "tag": expected,
              "package.xml": package_version,
              "pixi.toml": pixi_version,
          }
          if len(set(versions.values())) != 1:
              raise SystemExit(f"Release versions do not match: {versions}")

          changelog = pathlib.Path("CHANGELOG.rst").read_text(encoding="utf-8")
          if f"\n{expected} (" not in changelog:
              raise SystemExit(f"CHANGELOG.rst has no {expected} release entry")
          PY

  create-draft:
    name: Create draft GitHub release
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --repo "${REPOSITORY}" \
            --draft \
            --generate-notes \
            --title "${RELEASE_TAG}"
